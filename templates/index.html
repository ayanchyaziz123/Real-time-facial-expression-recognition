<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ayan's Emotion Detector</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0d14;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #e2e2f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 20px;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(120deg, #a78bfa, #f472b6, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .main {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 1080px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    /* Camera column */
    .camera-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1 1 460px;
      max-width: 560px;
    }

    .camera-card {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(167,139,250,0.25);
      box-shadow: 0 0 0 1px rgba(167,139,250,0.08), 0 20px 60px rgba(0,0,0,0.5);
      position: relative;
      background: #111;
    }

    /* Video + canvas stacked */
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #0a0a12;
    }
    .video-wrapper video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .video-wrapper canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Camera permission placeholder */
    .cam-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #555;
      font-size: 0.85rem;
    }
    .cam-placeholder svg { opacity: 0.3; }

    /* Live badge */
    .live-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* Message card */
    .message-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-left: 3px solid #a78bfa;
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #c4c4d8;
      transition: color 0.5s, border-left-color 0.5s;
    }

    /* Info panel */
    .info-panel {
      flex: 1 1 240px;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .emotion-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px 16px;
      text-align: center;
      transition: border-color 0.5s;
    }
    .emotion-emoji {
      font-size: 2.8rem;
      display: block;
      margin-bottom: 6px;
      line-height: 1;
    }
    .emotion-label {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
      transition: color 0.5s;
      margin-bottom: 12px;
    }
    .conf-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .confidence-bar-wrap {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      height: 5px;
      overflow: hidden;
    }
    .confidence-bar {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 0.6s ease, background 0.5s;
    }
    .confidence-text {
      font-size: 0.72rem;
      font-weight: 600;
      color: #888;
      white-space: nowrap;
    }

    .history-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px 16px;
    }
    .history-card h3 {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
      margin-bottom: 10px;
    }
    .pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }
    .pill.active { transform: scale(1.06); border-color: transparent; }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 20px;
      font-size: 0.72rem;
      color: #444;
      text-align: center;
    }
    footer span { color: #f472b6; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }
    .pulse { animation: pulse 1s ease-in-out; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp 0.35s ease forwards; }

    /* Mobile */
    @media (max-width: 640px) {
      body { padding: 14px 12px; }
      header { margin-bottom: 14px; }
      header h1 { font-size: 1.3rem; }
      .main { gap: 10px; }
      .camera-col { width: 100%; max-width: 100%; }
      .message-card { font-size: 0.85rem; padding: 10px 13px; }
      .info-panel { min-width: unset; width: 100%; max-width: 100%; flex-direction: row; gap: 10px; }
      .emotion-card { flex: 1; padding: 14px 12px; }
      .emotion-emoji { font-size: 2rem; }
      .emotion-label { font-size: 1.1rem; margin-bottom: 8px; }
      .history-card { flex: 1; padding: 12px; }
      .pill { font-size: 0.68rem; padding: 3px 8px; }
      footer { margin-top: 14px; }
    }

    /* Tablet */
    @media (min-width: 641px) and (max-width: 960px) {
      .camera-col { width: 100%; max-width: 100%; }
      .info-panel { width: 100%; max-width: 100%; flex-direction: row; }
      .emotion-card { flex: 1; }
      .history-card { flex: 1; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Ayan's Emotion Detector</h1>
    <button id="muteBtn" title="Toggle voice" style="
      margin-top:10px; background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12); border-radius:999px;
      color:#e2e2f0; font-size:0.78rem; font-weight:600;
      padding:6px 14px; cursor:pointer; letter-spacing:0.5px;
      display:inline-flex; align-items:center; gap:6px; transition:background 0.2s;
    ">🔊 Voice On</button>
  </header>

  <div class="main">

    <div class="camera-col">
      <div class="camera-card">
        <div class="video-wrapper">
          <!-- Placeholder shown before camera starts -->
          <div class="cam-placeholder" id="camPlaceholder">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
            </svg>
            <span id="camStatus">Requesting camera access...</span>
          </div>
          <video id="camVideo" autoplay muted playsinline></video>
          <canvas id="camCanvas"></canvas>
        </div>
        <div class="live-badge">
          <span class="live-dot"></span> LIVE
        </div>
      </div>
      <div class="message-card" id="messageCard">
        Stand in front of the camera and let me see your expression!
      </div>
    </div>

    <div class="info-panel">

      <div class="emotion-card" id="emotionCard">
        <span class="emotion-emoji" id="emotionEmoji">🙂</span>
        <div class="emotion-label" id="emotionLabel">Detecting...</div>
        <div class="conf-row">
          <div class="confidence-bar-wrap">
            <div class="confidence-bar" id="confBar"></div>
          </div>
          <span class="confidence-text" id="confText">0%</span>
        </div>
      </div>

      <div class="history-card">
        <h3>Detected</h3>
        <div class="pills" id="pills">
          <span class="pill" data-emotion="Angry"    style="color:#f87171">😤 Angry</span>
          <span class="pill" data-emotion="Disgust"  style="color:#fb923c">🤢 Disgust</span>
          <span class="pill" data-emotion="Fear"     style="color:#a78bfa">😨 Fear</span>
          <span class="pill" data-emotion="Happy"    style="color:#4ade80">😊 Happy</span>
          <span class="pill" data-emotion="Sad"      style="color:#60a5fa">😢 Sad</span>
          <span class="pill" data-emotion="Surprise" style="color:#facc15">😲 Surprise</span>
          <span class="pill" data-emotion="Neutral"  style="color:#f472b6">😌 Neutral</span>
        </div>
      </div>

    </div>
  </div>

  <footer>Made with <span>♥</span> by Ayan</footer>

  <script>
    const EMOJIS = {
      Angry: '😤', Disgust: '🤢', Fear: '😨',
      Happy: '😊', Sad: '🥺', Surprise: '😲', Neutral: '😌',
    };

    const video       = document.getElementById('camVideo');
    const overlay     = document.getElementById('camCanvas');
    const ctx         = overlay.getContext('2d');
    const placeholder = document.getElementById('camPlaceholder');
    const statusEl    = document.getElementById('camStatus');

    let lastEmotion = '';
    let cameraReady = false;
    let voiceOn     = true;

    // Strip emojis so speech synthesis reads clean text
    function stripEmoji(text) {
      return text.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27FF}]/gu, '').trim();
    }

    // Pick the best available male English voice
    let maleVoice = null;

    function loadMaleVoice() {
      const voices = window.speechSynthesis.getVoices();
      const en     = voices.filter(v => v.lang.startsWith('en'));

      // Priority: voices with "male" in name, then common male voice names
      maleVoice =
        en.find(v => /male/i.test(v.name))                          ||
        en.find(v => /\b(david|daniel|alex|fred|tom|james|john|mark|paul|aaron|arthur|oliver|rishi|thomas|moira)\b/i.test(v.name)) ||
        en.find(v => v.name.includes('Google UK English Male'))      ||
        en.find(v => v.name.includes('Microsoft David'))             ||
        en[0]                                                        ||
        voices[0]                                                    ||
        null;
    }

    window.speechSynthesis.onvoiceschanged = loadMaleVoice;
    loadMaleVoice();

    function speak(text) {
      if (!voiceOn || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utter   = new SpeechSynthesisUtterance(stripEmoji(text));
      if (maleVoice) utter.voice = maleVoice;
      utter.rate   = 0.95;
      utter.pitch  = 0.8;   // lower pitch = deeper/manlier
      utter.volume = 1.0;
      window.speechSynthesis.speak(utter);
    }

    const muteBtn = document.getElementById('muteBtn');
    muteBtn.addEventListener('click', () => {
      voiceOn = !voiceOn;
      muteBtn.textContent = voiceOn ? '🔊 Voice On' : '🔇 Voice Off';
      muteBtn.style.opacity = voiceOn ? '1' : '0.5';
      if (!voiceOn) window.speechSynthesis.cancel();
    });

    // Start browser camera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 }, audio: false })
      .then(stream => {
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          overlay.width  = video.videoWidth;
          overlay.height = video.videoHeight;
          placeholder.style.display = 'none';
          cameraReady = true;
        };
      })
      .catch(err => {
        statusEl.textContent = 'Camera access denied. Please allow camera permission.';
        console.error('Camera error:', err);
      });

    // Capture a mirrored frame and send to /predict
    async function processFrame() {
      if (!cameraReady || video.readyState < 2) return;

      // Capture frame at reduced resolution to save server memory
      const MAX_W = 320;
      const scale = Math.min(1, MAX_W / video.videoWidth);
      const cap = document.createElement('canvas');
      cap.width  = Math.round(video.videoWidth  * scale);
      cap.height = Math.round(video.videoHeight * scale);
      const capCtx = cap.getContext('2d');
      capCtx.translate(cap.width, 0);
      capCtx.scale(-1, 1);
      capCtx.drawImage(video, 0, 0, cap.width, cap.height);

      try {
        const res  = await fetch('/predict', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ frame: cap.toDataURL('image/jpeg', 0.5) }),
        });
        const data = await res.json();
        updateUI(data);
        drawOverlay(data);
      } catch (_) {}
    }

    function drawOverlay(data) {
      overlay.width  = video.videoWidth;
      overlay.height = video.videoHeight;
      ctx.clearRect(0, 0, overlay.width, overlay.height);

      for (const face of (data.faces || [])) {
        const color = data.color || '#a78bfa';
        const label = `${data.label}  ${data.confidence}%`;

        // Bounding box
        ctx.strokeStyle = color;
        ctx.lineWidth   = 2;
        ctx.strokeRect(face.x, face.y, face.w, face.h);

        // Label background
        ctx.font = 'bold 13px Inter, sans-serif';
        const tw = ctx.measureText(label).width;
        ctx.fillStyle = color;
        ctx.fillRect(face.x, face.y - 28, tw + 12, 26);

        // Label text
        ctx.fillStyle = '#fff';
        ctx.fillText(label, face.x + 6, face.y - 10);
      }
    }

    function updateUI(data) {
      const { label, confidence, message, color } = data;

      document.getElementById('emotionEmoji').textContent = EMOJIS[label] || '🙂';

      const labelEl = document.getElementById('emotionLabel');
      if (label !== lastEmotion) {
        labelEl.classList.remove('pulse');
        void labelEl.offsetWidth;
        labelEl.classList.add('pulse');
        lastEmotion = label;
        if (message) speak(message);
      }
      labelEl.textContent = label;
      labelEl.style.color = color;

      document.getElementById('confBar').style.width      = confidence + '%';
      document.getElementById('confBar').style.background = color;
      document.getElementById('confText').textContent     = confidence + '%';

      const msgEl = document.getElementById('messageCard');
      if (message && msgEl.textContent.trim() !== message) {
        msgEl.classList.remove('fade-in');
        void msgEl.offsetWidth;
        msgEl.classList.add('fade-in');
        msgEl.textContent           = message;
        msgEl.style.color           = color;
        msgEl.style.borderLeftColor = color;
      }

      document.getElementById('emotionCard').style.borderColor = color + '44';

      document.querySelectorAll('.pill').forEach(p => {
        if (p.dataset.emotion === label) {
          p.classList.add('active');
          p.style.background  = color + '22';
          p.style.borderColor = color + '88';
        } else {
          p.classList.remove('active');
          p.style.background  = '';
          p.style.borderColor = '';
        }
      });
    }

    setInterval(processFrame, 800);
  </script>
</body>
</html>
